<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Syndicate: Red Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #ff3e3e; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; overflow: hidden; }
        .safe-grid { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; min-height: 280px; }
        .row { display: flex; gap: 10px; opacity: 0.15; transition: 0.4s; }
        .row.active { opacity: 1; transform: scale(1.02); }
        
        .cell-input { 
            width: 55px; height: 60px; border: 2px solid #ff3e3e; background: rgba(255,0,0,0.05);
            color: #ff3e3e; font-size: 28px; font-weight: bold; text-align: center; 
            border-radius: 8px; outline: none; font-family: inherit; transition: 0.3s;
        }
        .cell-input:focus { border-color: #fff; box-shadow: 0 0 15px #ff3e3e; background: rgba(255,0,0,0.15); }
        .cell-input.correct { background: #238636 !important; border-color: #238636 !important; color: white; }
        .cell-input.wrong { background: #da3633 !important; border-color: #da3633 !important; color: white; }

        .btn-hack { 
            background: #ff3e3e; color: #000; border: none; padding: 18px 0; 
            font-family: inherit; font-weight: bold; font-size: 20px; width: 260px; 
            margin-top: 10px; border-radius: 10px; cursor: pointer; text-transform: uppercase;
        }
        .btn-hack:active { transform: scale(0.95); opacity: 0.8; }

        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; z-index: 100; }
        .modal-content { border: 1px solid #58a6ff; padding: 30px; border-radius: 15px; background: #0d1117; color: white; max-width: 340px; text-align: center; }
        .btn-next { background: #58a6ff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <h3 id="lvl-txt">СЕЙФ: УРОВЕНЬ 1</h3>
    
    <div class="safe-grid" id="grid">
        <div class="row active" id="row-0">
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric">
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric">
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric">
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric">
        </div>
        <div class="row" id="row-1">
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric" disabled>
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric" disabled>
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric" disabled>
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric" disabled>
        </div>
        <div class="row" id="row-2">
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric" disabled>
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric" disabled>
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric" disabled>
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric" disabled>
        </div>
        <div class="row" id="row-3">
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric" disabled>
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric" disabled>
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric" disabled>
            <input type="text" class="cell-input" maxlength="1" inputmode="numeric" disabled>
        </div>
    </div>

    <button class="btn-hack" onclick="verify()">ВЗЛОМАТЬ</button>

    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="color:#58a6ff">ДОСТУП ПОЛУЧЕН</h2>
            <p id="reward-text"></p>
            <p id="clue-text" style="color:#ff9d00; font-size:14px; border-top:1px solid #333; padding-top:15px; margin-top:15px;"></p>
            <button class="btn-next" onclick="nextLevel()">ПРОДОЛЖИТЬ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const levels = [
            { code: "2003", reward: "Инфо: Можно будет играть на бирже, скупать активы и влиять на мир.", clue: "Подсказка: Какой был номер группы создателя в кулинарном колледже?" },
            { code: "0453", reward: "Инфо: Открытый мир на Ближнем Востоке (Катар, Саудовская Аравия, Иран, Ирак).", clue: "Подсказка: Номер группы в технологическом институте?" },
            { code: "6421", reward: "Инфо: Игра от 1-го и от 3-го лица.", clue: "Подсказка: В каком году вышла первая часть Красного Протокола?" },
            { code: "0000", reward: "Инфо: Доступны авто, самолеты, вертолеты и катера.", clue: "ПОЗДРАВЛЯЕМ! Вы прошли все уровни Синдиката!" }
        ];

        let curLvl = 0;
        let curTry = 0;

        // Настройка логики ввода
        function setupInputs() {
            const rows = document.querySelectorAll('.row');
            rows.forEach((row, rIdx) => {
                const inputs = row.querySelectorAll('.cell-input');
                inputs.forEach((input, cIdx) => {
                    input.oninput = () => { if(input.value) focusNext(rIdx, cIdx); };
                    input.onkeydown = (e) => { 
                        if(e.key === 'Backspace' && !input.value) focusPrev(rIdx, cIdx);
                        if(e.key === 'Enter') verify();
                    };
                });
            });
        }

        function focusNext(rIdx, cIdx) {
            if (cIdx < 3) document.getElementById('row-'+rIdx).children[cIdx + 1].focus();
        }
        function focusPrev(rIdx, cIdx) {
            if (cIdx > 0) document.getElementById('row-'+rIdx).children[cIdx - 1].focus();
        }

        function verify() {
            const row = document.getElementById('row-' + curTry);
            const inputs = row.querySelectorAll('.cell-input');
            let guess = "";
            inputs.forEach(i => guess += i.value);

            if (guess.length < 4) return;

            let correct = 0;
            const target = levels[curLvl].code;

            for (let i = 0; i < 4; i++) {
                if (guess[i] === target[i]) {
                    inputs[i].classList.add('correct');
                    correct++;
                } else {
                    inputs[i].classList.add('wrong');
                }
            }

            if (correct === 4) {
                tg.HapticFeedback?.notificationOccurred('success');
                document.getElementById('reward-text').innerText = levels[curLvl].reward;
                document.getElementById('clue-text').innerText = levels[curLvl].clue;
                document.getElementById('modal').style.display = 'flex';
            } else {
                tg.HapticFeedback?.notificationOccurred('error');
                curTry++;
                if (curTry < 4) {
                    const nextRow = document.getElementById('row-' + curTry);
                    nextRow.classList.add('active');
                    nextRow.querySelectorAll('.cell-input').forEach(i => i.disabled = false);
                    nextRow.children[0].focus();
                } else {
                    alert("СИСТЕМА ЗАБЛОКИРОВАНА! Перезапуск...");
                    resetBoard();
                }
            }
        }

        function nextLevel() {
            document.getElementById('modal').style.display = 'none';
            if (curLvl === 3) {
                let p = JSON.parse(localStorage.getItem('syndicate_progress') || '[]');
                if(!p.includes('game-1')) p.push('game-1');
                localStorage.setItem('syndicate_progress', JSON.stringify(p));
                window.location.href = 'index.html';
            } else {
                curLvl++;
                resetBoard();
            }
        }

        function resetBoard() {
            curTry = 0;
            document.getElementById('lvl-txt').innerText = "СЕЙФ: УРОВЕНЬ " + (curLvl + 1);
            const rows = document.querySelectorAll('.row');
            rows.forEach((row, i) => {
                row.className = 'row' + (i === 0 ? ' active' : '');
                row.querySelectorAll('.cell-input').forEach(input => {
                    input.value = '';
                    input.classList.remove('correct', 'wrong');
                    input.disabled = (i !== 0);
                });
            });
            document.querySelector('#row-0 input').focus();
        }

        setupInputs();
        tg.ready();
    </script>
</body>
</html>
