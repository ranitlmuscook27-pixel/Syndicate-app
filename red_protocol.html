<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Красный Протокол 2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; font-family: 'Courier New', monospace; background: #050505; 
            color: #ff3e3e; overflow: hidden; user-select: none;
        }
        
        /* Главное меню */
        #menu-screen { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; text-align: center; padding: 20px; box-sizing: border-box; background: #0d1117;
        }
        h1 { font-size: 32px; text-transform: uppercase; text-shadow: 0 0 15px rgba(255,62,62,0.8); margin-bottom: 30px; letter-spacing: 2px;}
        #menu-screen img { 
            width: 100%; max-width: 350px; border-radius: 12px; border: 2px solid #ff3e3e; 
            box-shadow: 0 0 25px rgba(255,62,62,0.4); margin-bottom: 40px;
        }

        /* Экран игры */
        #game-screen { 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; padding: 10px; box-sizing: border-box;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://sun9-18.userapi.com/s/v1/ig2/NIVG7DIPYsNjLIknvm8VPmekoxeUOtMNfvvQxpfrTsbHSCwHPD4koWrMwUSTnBuRpwUVYi0xbaTTF1-npYNpOttD.jpg?quality=95&as=32x20,48x30,72x44,108x67,160x99,240x148,360x222,480x296,540x333,640x395,720x444,1080x667,1244x768&from=bu&u=Lkv39YOdjxq8HNeV8Kxo-8fce0yW4u1eqMz7z3BxNuQ&cs=1244x0') center/cover no-repeat;
        }
        #lvl-txt { font-size: 26px; letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase; font-weight: bold; text-shadow: 0 0 10px #ff3e3e;}
        .version { font-size: 12px; color: #555; position: absolute; top: 10px; right: 10px; font-weight: bold; }

        /* Сетка сейфа */
        .safe-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .row { display: flex; gap: 12px; opacity: 0.3; pointer-events: none; transition: 0.4s; }
        .row.active { opacity: 1; transform: scale(1.05); pointer-events: auto; }
        
        .cell-input { 
            width: 55px; height: 60px; border: 2px solid #ff3e3e; background: rgba(255,0,0,0.1);
            color: #ff3e3e; font-size: 30px; font-weight: bold; text-align: center; 
            border-radius: 8px; outline: none; font-family: inherit; transition: 0.3s;
        }
        .cell-input:focus { border-color: #fff; box-shadow: 0 0 15px #ff3e3e; background: rgba(255,0,0,0.2); }
        .cell-input.correct { background: #238636 !important; border-color: #238636 !important; color: white; box-shadow: 0 0 15px #238636; }
        .cell-input.wrong { background: #da3633 !important; border-color: #da3633 !important; color: white; box-shadow: 0 0 15px #da3633; }

        /* Кнопки */
        button { 
            background: #ff3e3e; color: #000; border: none; padding: 18px 0; width: 280px;
            font-family: inherit; font-weight: bold; font-size: 22px; border-radius: 10px; 
            cursor: pointer; text-transform: uppercase; box-shadow: 0 0 20px rgba(255,62,62,0.5); transition: 0.2s; margin-top: 10px;
        }
        button:active { transform: scale(0.95); opacity: 0.8; }
        .btn-blue { background: #58a6ff; color: #000; box-shadow: 0 0 20px rgba(88,166,255,0.5); width: 100%;}

        /* Модальное окно */
        #modal { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.92); justify-content: center; align-items: center; 
            z-index: 100; padding: 20px; box-sizing: border-box;
        }
        .modal-content { 
            background: #0d1117; border: 2px solid #58a6ff; padding: 30px; 
            border-radius: 15px; max-width: 350px; text-align: center; color: white;
        }
        .modal-content h2 { color: #58a6ff; margin-top: 0; font-size: 24px; text-transform: uppercase; }
        .modal-content p { font-size: 16px; line-height: 1.5; margin-bottom: 20px;}
        .clue { color: #ff9d00; border-top: 1px solid #333; padding-top: 15px; margin-bottom: 20px; font-size: 15px; font-style: italic; }
        
        .final-congrats { color: #238636; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px #238636; border-top: 1px solid #333; padding-top: 15px; margin-bottom: 20px;}
    </style>
</head>
<body>
    <div class="version">v7.0</div>

    <div id="menu-screen">
        <h1>Красный Протокол 2</h1>
        <img src="https://sun9-61.userapi.com/s/v1/ig2/08Z4TORIEHyY38fX1IMH18fOAHCp7apVMMTjUEdE5O1Ru01LjqcN5uU1EJFDDbkZBz07rKKODj0Zs2914VeWpJpU.jpg?quality=95&as=32x20,48x31,72x46,108x69,160x102,240x153,360x230,480x306,540x344,640x408,720x459,1080x689,1176x750&from=bu&u=RFfxfTQ267QIg_GGvrimXQaDP-YdnjFoYQg5YsBAqAk&cs=1176x0" alt="Постер">
        <button id="btn-start">НАЧАТЬ ИГРУ</button>
    </div>

    <div id="game-screen">
        <h3 id="lvl-txt">СЕЙФ: УРОВЕНЬ 1</h3>
        <div class="safe-grid" id="grid">
            <div class="row active" id="row-0">
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-0-0">
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-0-1">
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-0-2">
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-0-3">
            </div>
            <div class="row" id="row-1">
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-1-0" disabled>
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-1-1" disabled>
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-1-2" disabled>
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-1-3" disabled>
            </div>
            <div class="row" id="row-2">
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-2-0" disabled>
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-2-1" disabled>
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-2-2" disabled>
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-2-3" disabled>
            </div>
            <div class="row" id="row-3">
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-3-0" disabled>
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-3-1" disabled>
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-3-2" disabled>
                <input type="text" class="cell-input" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="cell-3-3" disabled>
            </div>
        </div>
        <button id="btn-hack">ВЗЛОМАТЬ СЕЙФ</button>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title">СЕЙФ ОТКРЫТ!</h2>
            <p id="reward-text"></p>
            <div id="clue-container"></div>
            <button class="btn-blue" id="next-btn">ПРОДОЛЖИТЬ</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App (чисто для дизайна окна, без лишних функций)
        try { 
            var tg = window.Telegram.WebApp;
            if (tg) tg.expand(); 
        } catch (e) {}

        // База данных игры
        var levelsData = [
            { 
                code: "2003", 
                reward: "Можно будет играть на биржевом рынке, скупать криптовалюты, дорогие металлы, и влиять на будущий мир.", 
                clue: "Какой номер группы был у основателя компании Syndicate Games Studio в кулинарном колледже?" 
            },
            { 
                code: "0453", 
                reward: "Будет открытый мир на Ближнем Востоке (будут доступны 4 страны: Катар, Саудовская Аравия, Иран, Ирак).", 
                clue: "Какой номер группы был у основателя компании Syndicate Games Studio в технологическом институте?" 
            },
            { 
                code: "6421", 
                reward: "Можно будет играть как от первого так и от третьего лица.", 
                clue: "В каком году вышла первая часть игры Красный протокол?" 
            },
            { 
                code: "2024", 
                reward: "Можно будет водить автомобили и летать на самолете, вертолете, брать катера.", 
                clue: "ПОЗДРАВЛЯЕМ!\nВы прошли игру, вы истинный знаток серии Syndicate Games!" 
            }
        ];

        var currentLvl = 0;
        var currentTry = 0;

        // ПРИВЯЗКА КНОПОК
        document.getElementById('btn-start').addEventListener('click', startGame);
        document.getElementById('btn-hack').addEventListener('click', attemptHack);
        document.getElementById('next-btn').addEventListener('click', goToNextStage);

        // Настройка полей ввода
        var rows = document.querySelectorAll('.row');
        for (var r = 0; r < rows.length; r++) {
            var inputs = rows[r].querySelectorAll('.cell-input');
            for (var c = 0; c < inputs.length; c++) {
                (function(rowIdx, colIdx, inputField) {
                    inputField.addEventListener('input', function() {
                        inputField.value = inputField.value.replace(/[^0-9]/g, ''); 
                        if (inputField.value.length > 1) inputField.value = inputField.value.slice(-1);
                        if (inputField.value !== '' && colIdx < 3) {
                            document.getElementById('cell-' + rowIdx + '-' + (colIdx + 1)).focus();
                        }
                    });
                    inputField.addEventListener('keydown', function(e) {
                        if (e.key === 'Backspace' && inputField.value === '' && colIdx > 0) {
                            document.getElementById('cell-' + rowIdx + '-' + (colIdx - 1)).focus();
                        }
                    });
                })(r, c, inputs[c]);
            }
        }

        // Глобальный слушатель кнопок: Enter и Пробел
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.code === 'Space') {
                if (e.target.tagName === 'INPUT' && e.code === 'Space') {
                    e.preventDefault();
                    return;
                }
                if (e.code === 'Space') e.preventDefault(); 
                
                if (document.getElementById('modal').style.display === 'flex') {
                    goToNextStage();
                } else if (document.getElementById('game-screen').style.display === 'flex') {
                    attemptHack();
                } else if (document.getElementById('menu-screen').style.display === 'flex') {
                    startGame();
                }
            }
        });

        function startGame() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            resetBoard();
        }

        function attemptHack() {
            var row = document.getElementById('row-' + currentTry);
            var inputs = row.querySelectorAll('.cell-input');
            var guess = "";
            
            for (var i = 0; i < inputs.length; i++) {
                guess += inputs[i].value.trim();
            }

            if (guess.length < 4) {
                alert("Агент, введите все 4 цифры кода!");
                return;
            }

            var correctCount = 0;
            var targetCode = levelsData[currentLvl].code;

            for (var j = 0; j < 4; j++) {
                if (guess[j] === targetCode[j]) {
                    inputs[j].classList.add('correct');
                    correctCount++;
                } else {
                    inputs[j].classList.add('wrong');
                }
            }

            if (correctCount === 4) {
                document.getElementById('reward-text').innerText = levelsData[currentLvl].reward;
                
                var clueContainer = document.getElementById('clue-container');
                if (currentLvl === 3) {
                    document.getElementById('modal-title').innerText = "МИССИЯ ЗАВЕРШЕНА";
                    document.getElementById('modal-title').style.color = "#238636";
                    document.querySelector('.modal-content').style.borderColor = "#238636";
                    clueContainer.innerHTML = '<div class="final-congrats">' + levelsData[currentLvl].clue.replace('\n', '<br>') + '</div>';
                    document.getElementById('next-btn').innerText = "ВЕРНУТЬСЯ НА БАЗУ";
                    document.getElementById('next-btn').style.background = "#238636";
                } else {
                    document.getElementById('modal-title').innerText = "СЕЙФ ОТКРЫТ!";
                    document.getElementById('modal-title').style.color = "#58a6ff";
                    document.querySelector('.modal-content').style.borderColor = "#58a6ff";
                    clueContainer.innerHTML = '<div class="clue">Подсказка: ' + levelsData[currentLvl].clue + '</div>';
                    document.getElementById('next-btn').innerText = "СЛЕДУЮЩИЙ УРОВЕНЬ";
                    document.getElementById('next-btn').style.background = "#58a6ff";
                }
                
                document.getElementById('modal').style.display = 'flex';
            } else {
                currentTry++;
                if (currentTry < 4) {
                    row.classList.remove('active');
                    for (var k = 0; k < inputs.length; k++) inputs[k].disabled = true;
                    
                    var nextRow = document.getElementById('row-' + currentTry);
                    nextRow.classList.add('active');
                    var nextInputs = nextRow.querySelectorAll('.cell-input');
                    for (var m = 0; m < nextInputs.length; m++) nextInputs[m].disabled = false;
                    
                    document.getElementById('cell-' + currentTry + '-0').focus();
                } else {
                    alert("ТРЕВОГА! ВЗЛОМ ПРОВАЛЕН! Перезагрузка системы...");
                    resetBoard();
                }
            }
        }

        function goToNextStage() {
            document.getElementById('modal').style.display = 'none';
            if (currentLvl === 3) {
                currentLvl = 0;
                document.getElementById('game-screen').style.display = 'none';
                document.getElementById('menu-screen').style.display = 'flex';
            } else {
                currentLvl++;
                resetBoard();
            }
        }

        function resetBoard() {
            currentTry = 0;
            document.getElementById('lvl-txt').innerText = "СЕЙФ: УРОВЕНЬ " + (currentLvl + 1);
            
            for (var r = 0; r < 4; r++) {
                var row = document.getElementById('row-' + r);
                if (r === 0) row.classList.add('active');
                else row.classList.remove('active');
                
                var inputs = row.querySelectorAll('.cell-input');
                for (var c = 0; c < inputs.length; c++) {
                    inputs[c].value = '';
                    inputs[c].classList.remove('correct', 'wrong');
                    inputs[c].disabled = (r !== 0);
                }
            }
            setTimeout(function() { 
                var firstInput = document.getElementById('cell-0-0');
                if (firstInput) firstInput.focus(); 
            }, 100);
        }
    </script>
</body>
</html>
