<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Взлом: Красный Протокол 2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0a0a; color: #ff3e3e; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; text-align: center; }
        .safe-grid { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .row { display: flex; gap: 10px; opacity: 0.3; }
        .row.active { opacity: 1; }
        .cell { width: 50px; height: 50px; border: 2px solid #ff3e3e; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border-radius: 5px; cursor: pointer; background: rgba(255,0,0,0.05); }
        .cell.correct { background: #238636; border-color: #238636; color: white; }
        .cell.wrong { background: #da3633; border-color: #da3633; color: white; }
        .btn-check { background: transparent; border: 2px solid #ff3e3e; color: #ff3e3e; padding: 15px 30px; font-family: inherit; width: 230px; margin-top: 10px; }
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { border: 1px solid #58a6ff; padding: 20px; border-radius: 10px; background: #0d1117; color: white; }
    </style>
</head>
<body>
    <h3 id="lvl-txt">СЕЙФ: УРОВЕНЬ 1</h3>
    <div class="safe-grid" id="grid">
        <div class="row active" id="row-0">
            <div class="cell" onclick="changeNum(this)">0</div><div class="cell" onclick="changeNum(this)">0</div><div class="cell" onclick="changeNum(this)">0</div><div class="cell" onclick="changeNum(this)">0</div>
        </div>
        <div class="row" id="row-1"><div class="cell">?</div><div class="cell">?</div><div class="cell">?</div><div class="cell">?</div></div>
        <div class="row" id="row-2"><div class="cell">?</div><div class="cell">?</div><div class="cell">?</div><div class="cell">?</div></div>
        <div class="row" id="row-3"><div class="cell">?</div><div class="cell">?</div><div class="cell">?</div><div class="cell">?</div></div>
    </div>
    <button class="btn-check" onclick="verify()">ВЗЛОМАТЬ</button>
    <div id="modal">
        <div class="modal-content">
            <h2 style="color:#58a6ff">СЕЙФ ОТКРЫТ!</h2>
            <p id="reward-text"></p>
            <p id="clue-text" style="color:#ff9d00; font-size:14px; border-top:1px solid #333; padding-top:10px"></p>
            <button class="btn-check" style="border-color:#58a6ff; color:#58a6ff" onclick="next()">ПРОДОЛЖИТЬ</button>
        </div>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const levels = [
            { code: "2003", reward: "Инфо: Можно будет играть на бирже, скупать крипту и влиять на мир.", clue: "Подсказка: Какой был номер группы создателя в кулинарном колледже?" },
            { code: "0453", reward: "Инфо: Открытый мир на Ближнем Востоке (Катар, Саудовская Аравия, Иран, Ирак).", clue: "Подсказка: Номер группы в технологическом институте?" },
            { code: "6421", reward: "Инфо: Игра от 1-го и от 3-го лица.", clue: "Подсказка: В каком году вышла первая часть Красного Протокола?" },
            { code: "0000", reward: "Инфо: Доступны авто, самолеты, вертолеты и катера.", clue: "ПОЗДРАВЛЯЕМ! Вы прошли игру, вы — истинный знаток серии!" }
        ];
        let curLvl = 0; let curTry = 0;
        function changeNum(el) { el.innerText = (parseInt(el.innerText) + 1) % 10; }
        function verify() {
            const row = document.getElementById(`row-${curTry}`);
            const cells = row.querySelectorAll('.cell');
            let guess = ""; cells.forEach(c => guess += c.innerText);
            let correct = 0;
            for(let i=0; i<4; i++) {
                if(guess[i] === levels[curLvl].code[i]) { cells[i].classList.add('correct'); correct++; }
                else cells[i].classList.add('wrong');
            }
            if(correct === 4) { showModal(); }
            else { 
                curTry++; 
                if(curTry < 4) {
                    document.getElementById(`row-${curTry}`).classList.add('active');
                    document.getElementById(`row-${curTry}`).querySelectorAll('.cell').forEach(c => { c.innerText="0"; c.onclick=function(){changeNum(this)}});
                } else { alert("Сброс сейфа!"); location.reload(); }
            }
        }
        function showModal() {
            document.getElementById('reward-text').innerText = levels[curLvl].reward;
            document.getElementById('clue-text').innerText = levels[curLvl].clue;
            document.getElementById('modal').style.display = 'flex';
        }
        function next() {
            if(curLvl === 3) {
                let p = JSON.parse(localStorage.getItem('syndicate_progress') || '[]');
                if(!p.includes('game-1')) p.push('game-1');
                localStorage.setItem('syndicate_progress', JSON.stringify(p));
                location.href = 'index.html';
            } else {
                curLvl++; curTry = 0;
                document.getElementById('modal').style.display = 'none';
                document.getElementById('lvl-txt').innerText = "СЕЙФ: УРОВЕНЬ " + (curLvl+1);
                location.reload(); // Простой способ сбросить сетку
            }
        }
        tg.ready();
    </script>
</body>
</html>
