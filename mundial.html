<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мундиаль 26 - Syndicate Games</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a14; color: #fff; overflow: hidden; user-select: none; touch-action: none; }
        
        .screen { display: none; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; padding: 20px; box-sizing: border-box; background: radial-gradient(circle at top, #1a1a2e 0%, #05050a 100%); position: absolute; top: 0; left: 0; width: 100%; z-index: 10; overflow-y: auto; }
        .active-screen { display: flex; }

        h1 { color: #00ffcc; font-size: 32px; text-transform: uppercase; text-shadow: 0 0 15px rgba(0, 255, 204, 0.6); margin-bottom: 10px; margin-top: 20px; text-align: center; }
        h2 { color: #fff; font-size: 20px; margin-bottom: 20px; text-transform: uppercase; text-align: center; border-bottom: 2px solid #00ffcc; padding-bottom: 5px; width: 100%; }

        .game-poster { width: 100%; max-width: 320px; border-radius: 12px; border: 2px solid #00ffcc; box-shadow: 0 0 25px rgba(0,255,204,0.3); margin-bottom: 30px; object-fit: cover; }

        .btn-panel { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; margin-bottom: 20px; }
        button { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid #333; padding: 18px; width: 100%; font-family: inherit; font-weight: bold; font-size: 16px; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: 0.2s; backdrop-filter: blur(5px); }
        button:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(90deg, #00b09b, #96c93d); border: none; box-shadow: 0 5px 15px rgba(0, 176, 155, 0.4); color: #000; }
        .btn-danger { background: rgba(218, 54, 51, 0.2); border-color: #da3633; color: #ff6b6b; }

        .setup-group { background: rgba(0,0,0,0.5); border: 1px solid #222; border-radius: 8px; padding: 15px; width: 100%; max-width: 320px; margin-bottom: 12px; text-align: left; }
        .setup-group label { display: block; color: #888; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        select { background: transparent; color: #00ffcc; border: none; font-size: 18px; font-weight: bold; width: 100%; outline: none; font-family: inherit; cursor: pointer; }
        select option { background: #111; color: #fff; }

        .bracket-box { background: rgba(0, 255, 204, 0.05); border: 1px solid #00ffcc; border-radius: 8px; padding: 15px; margin-bottom: 15px; width: 100%; max-width: 320px; text-align: center; }
        .matchup { display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: bold; margin-bottom: 10px; background: #000; padding: 10px; border-radius: 5px; }
        .matchup.player-match { border: 1px solid #00ffcc; box-shadow: 0 0 10px rgba(0,255,204,0.2); }

        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        
        #btn-quit-match { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #aaa; border: 1px solid #555; padding: 6px 10px; border-radius: 6px; font-size: 10px; pointer-events: auto; cursor: pointer; text-transform: uppercase; font-weight: bold; z-index: 20;}
        #btn-quit-match:active { background: #da3633; color: white; border-color: #da3633;}

        #scoreboard { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border: 1px solid #00ffcc; border-radius: 6px; padding: 5px 10px; display: flex; flex-direction: column; width: auto; min-width: 200px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: auto; }
        .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
        .team-name { font-size: 11px; font-weight: bold; width: 40%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ddd;}
        .team-score { font-size: 16px; font-weight: bold; color: #00ffcc; width: 20%; text-align: center; }
        .dots-container { display: flex; gap: 3px; width: 40%; justify-content: flex-end; flex-wrap: nowrap; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #222; border: 1px solid #555; }
        .dot.hit { background: #00ffcc; border-color: #00ffcc; box-shadow: 0 0 5px #00ffcc; }
        .dot.miss { background: #da3633; border-color: #da3633; box-shadow: 0 0 5px #da3633; }

        #turn-msg { position: absolute; top: 60px; width: 100%; text-align: center; font-size: 16px; font-weight: bold; text-shadow: 0 2px 4px #000; transition: 0.3s; letter-spacing: 1px;}

        #power-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70%; max-width: 250px; height: 20px; background: rgba(0,0,0,0.8); border: 2px solid #555; border-radius: 10px; overflow: hidden; display: none; }
        #power-fill { width: 0%; height: 100%; background: #fff; transition: width 0.05s linear, background-color 0.1s; }
        .power-markers { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; pointer-events: none; }
        .marker { border-right: 2px solid #000; height: 100%; flex: 1; box-sizing: border-box; }
        
        #target-cursor { position: absolute; width: 30px; height: 30px; border: 2px dashed #fff; border-radius: 50%; transform: translate(-50%, -50%); display: none; pointer-events: none; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        canvas { display: block; width: 100vw; height: 100vh; background: #081b08; cursor: crosshair; }
        .version { font-size: 10px; color: #555; position: absolute; top: 10px; right: 10px; z-index: 20;}

        #screen-result { justify-content: center; }
    </style>
</head>
<body>
    <div class="version">Mundial v4.0 (Pro Physics & Goalie Jump)</div>

    <div id="screen-intro" class="screen active-screen">
        <h1>⚽ Мундиаль 26</h1>
        <img src="https://sun9-85.userapi.com/s/v1/ig2/jbTE3bcwncZn8GNwb9GhG9GwoKbB37gaSyE_sMZq0Bkm8atWayVYORfjJA-L5DW_w6kjxpcrE3l5rqZ2vYI8Pf2R.jpg?quality=95&as=32x24,48x36,72x54,108x81,160x119,240x179,360x269,480x358,540x403,640x478,720x538,1080x806,1200x896&from=bu&u=XKNWGwmPq6I_rCJN2t6z1au03wGPdb5z-Vb70wukruw&cs=1200x0" class="game-poster">
        <div class="btn-panel">
            <button class="btn-primary" onclick="switchScreen('screen-modes')">МЕНЮ РЕЖИМОВ</button>
            <button class="btn-danger" onclick="window.location.href='index.html'">В ХАБ</button>
        </div>
    </div>

    <div id="screen-modes" class="screen">
        <h2>ВЫБЕРИТЕ РЕЖИМ</h2>
        <div class="btn-panel" style="margin-top: 20px;">
            <button onclick="selectMode('quick')">⚡ Быстрый матч</button>
            <button onclick="selectMode('pvp')">👥 Игрок vs Игрок</button>
            <button class="btn-primary" onclick="selectMode('tournament')">🏆 ТУРНИР (1/4 ФИНАЛА)</button>
            <button class="btn-danger" style="margin-top: 20px;" onclick="switchScreen('screen-intro')">НАЗАД</button>
        </div>
    </div>

    <div id="screen-setup" class="screen">
        <h2 id="setup-title">НАСТРОЙКИ МАТЧА</h2>
        <div class="setup-group">
            <label id="lbl-team1">Ваша Команда</label>
            <select id="sel-team1"></select>
        </div>
        <div class="setup-group" id="grp-team2">
            <label id="lbl-team2">Команда Соперника</label>
            <select id="sel-team2"></select>
        </div>
        <div class="setup-group" id="grp-kicks">
            <label>Количество ударов</label>
            <select id="sel-kicks">
                <option value="4">4 удара</option>
                <option value="6">6 ударов</option>
                <option value="8">8 ударов</option>
            </select>
        </div>
        <div class="btn-panel">
            <button class="btn-primary" onclick="launchMode()">ГОТОВО</button>
            <button onclick="switchScreen('screen-modes')">НАЗАД</button>
        </div>
    </div>

    <div id="screen-bracket" class="screen">
        <h2 id="bracket-title">1/4 ФИНАЛА</h2>
        <div id="bracket-container" style="width: 100%; max-width: 320px;"></div>
        <div class="btn-panel" style="margin-top: 20px;">
            <button class="btn-primary" onclick="startTournamentMatch()">СЫГРАТЬ СВОЙ МАТЧ</button>
            <button class="btn-danger" onclick="switchScreen('screen-modes')">ПОКИНУТЬ ТУРНИР</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h1 id="res-title" style="font-size: 40px; margin-top: 0;">ПОБЕДА</h1>
        <h2 id="res-score" style="font-size: 50px; color: #fff; border: none; margin-top: 10px;">0 : 0</h2>
        <p id="res-reward" style="font-size: 20px; color: #00ffcc; font-weight: bold; margin-bottom: 30px;"></p>
        <div class="btn-panel">
            <button class="btn-primary" id="btn-next-action" onclick="handleResultNext()">ПРОДОЛЖИТЬ</button>
            <button class="btn-danger" onclick="switchScreen('screen-modes')">В МЕНЮ ИГРЫ</button>
        </div>
    </div>

    <div id="screen-game" class="screen" style="padding:0; background: none;">
        <canvas id="gameCanvas"></canvas>
        <div id="game-ui">
            <button id="btn-quit-match" onclick="quitMatchEarly()">Выход</button>
            <div id="scoreboard">
                <div class="score-row">
                    <div class="team-name" id="sb-t1-name">КОМАНДА 1</div>
                    <div class="team-score" id="sb-t1-score">0</div>
                    <div class="dots-container" id="sb-t1-dots"></div>
                </div>
                <div style="width: 100%; height: 1px; background: #444; margin: 2px 0;"></div>
                <div class="score-row">
                    <div class="team-name" id="sb-t2-name">КОМАНДА 2</div>
                    <div class="team-score" id="sb-t2-score">0</div>
                    <div class="dots-container" id="sb-t2-dots"></div>
                </div>
            </div>
            
            <div id="turn-msg">ВАШ УДАР</div>
            <div id="target-cursor"></div>
            
            <div id="power-container">
                <div class="power-markers">
                    <div class="marker"></div><div class="marker"></div><div class="marker"></div><div class="marker"></div><div class="marker" style="border:none;"></div>
                </div>
                <div id="power-fill"></div>
            </div>
        </div>
    </div>

    <script>
        // БАЗА КОМАНД
        const teamsDB = [
            { id: 1, name: "ЯДРО", emoji: "💥" },
            { id: 2, name: "ЗВЕЗДА", emoji: "⭐" },
            { id: 3, name: "АТОМ", emoji: "⚛️" },
            { id: 4, name: "ЦУНАМИ", emoji: "🌊" },
            { id: 5, name: "УРАГАН", emoji: "🌪️" },
            { id: 6, name: "ТОРНАДО", emoji: "🌀" },
            { id: 7, name: "МОЛНИИ", emoji: "⚡" },
            { id: 8, name: "СТРЕЛА", emoji: "🏹" }
        ];

        let currentMode = '';
        let matchData = { t1: null, t2: null, kicks: 5, t1Score: 0, t2Score: 0, t1History: [], t2History: [], currentRound: 0, turn: 1, isEnded: false };
        let tourneyData = { active: false, round: 0, playerTeam: null, teamsLeft: [] };

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            if (id !== 'screen-game') cancelAnimationFrame(animId);
        }

        function populateSelect(id) {
            const sel = document.getElementById(id);
            sel.innerHTML = '';
            teamsDB.forEach(t => {
                let opt = document.createElement('option');
                opt.value = t.id;
                opt.innerText = `${t.emoji} ${t.name}`;
                sel.appendChild(opt);
            });
        }

        function selectMode(mode) {
            currentMode = mode;
            populateSelect('sel-team1');
            populateSelect('sel-team2');
            document.getElementById('sel-team2').value = 2;
            
            if (mode === 'quick') {
                document.getElementById('setup-title').innerText = "БЫСТРЫЙ МАТЧ";
                document.getElementById('lbl-team1').innerText = "Ваша Команда";
                document.getElementById('grp-team2').style.display = 'block';
                document.getElementById('lbl-team2').innerText = "ИИ Соперник";
                document.getElementById('grp-kicks').style.display = 'block';
            } else if (mode === 'pvp') {
                document.getElementById('setup-title').innerText = "ИГРОК ПРОТИВ ИГРОКА";
                document.getElementById('lbl-team1').innerText = "Игрок 1";
                document.getElementById('grp-team2').style.display = 'block';
                document.getElementById('lbl-team2').innerText = "Игрок 2";
                document.getElementById('grp-kicks').style.display = 'block';
            } else if (mode === 'tournament') {
                document.getElementById('setup-title').innerText = "НАСТРОЙКА ТУРНИРА";
                document.getElementById('lbl-team1').innerText = "Выберите свой клуб";
                document.getElementById('grp-team2').style.display = 'none';
                document.getElementById('grp-kicks').style.display = 'block';
            }
            switchScreen('screen-setup');
        }

        function launchMode() {
            let t1Id = parseInt(document.getElementById('sel-team1').value);
            let kicks = parseInt(document.getElementById('sel-kicks').value);
            
            if (currentMode === 'tournament') {
                tourneyData.active = true;
                tourneyData.round = 0;
                tourneyData.playerTeam = teamsDB.find(t => t.id === t1Id);
                let others = teamsDB.filter(t => t.id !== t1Id).sort(() => 0.5 - Math.random());
                tourneyData.teamsLeft = [tourneyData.playerTeam, ...others]; 
                matchData.kicks = kicks;
                buildBracket();
                switchScreen('screen-bracket');
            } else {
                let t2Id = parseInt(document.getElementById('sel-team2').value);
                if(t1Id === t2Id && currentMode !== 'pvp') {
                    alert("В Быстром матче команды должны различаться!"); return;
                }
                setupMatch(teamsDB.find(t=>t.id===t1Id), teamsDB.find(t=>t.id===t2Id), kicks);
                startGame();
            }
        }

        function buildBracket() {
            const titles = ["1/4 ФИНАЛА", "ПОЛУФИНАЛ", "ФИНАЛ"];
            document.getElementById('bracket-title').innerText = titles[tourneyData.round];
            const cont = document.getElementById('bracket-container');
            cont.innerHTML = '';
            for(let i=0; i < tourneyData.teamsLeft.length; i+=2) {
                let tA = tourneyData.teamsLeft[i];
                let tB = tourneyData.teamsLeft[i+1];
                let isPlayerMatch = (tA.id === tourneyData.playerTeam.id || tB.id === tourneyData.playerTeam.id);
                cont.innerHTML += `<div class="matchup ${isPlayerMatch ? 'player-match' : ''}">
                    <span>${tA.emoji} ${tA.name}</span><span style="color:#555; font-size: 14px;">VS</span><span>${tB.name} ${tB.emoji}</span>
                </div>`;
            }
        }

        function startTournamentMatch() {
            setupMatch(tourneyData.teamsLeft[0], tourneyData.teamsLeft[1], matchData.kicks);
            startGame();
        }

        function setupMatch(team1, team2, kicks) {
            matchData.t1 = team1;
            matchData.t2 = team2;
            matchData.kicks = kicks;
            matchData.t1Score = 0;
            matchData.t2Score = 0;
            matchData.t1History = Array(kicks).fill('empty');
            matchData.t2History = Array(kicks).fill('empty');
            matchData.currentRound = 0;
            matchData.turn = 1; 
            matchData.isEnded = false;
        }

        function updateUI() {
            document.getElementById('sb-t1-name').innerText = matchData.t1.emoji + " " + matchData.t1.name;
            document.getElementById('sb-t2-name').innerText = matchData.t2.emoji + " " + matchData.t2.name;
            document.getElementById('sb-t1-score').innerText = matchData.t1Score;
            document.getElementById('sb-t2-score').innerText = matchData.t2Score;
            const makeDots = (hist) => hist.map(h => `<div class="dot ${h}"></div>`).join('');
            document.getElementById('sb-t1-dots').innerHTML = makeDots(matchData.t1History);
            document.getElementById('sb-t2-dots').innerHTML = makeDots(matchData.t2History);

            let msg = document.getElementById('turn-msg');
            if (currentMode === 'pvp') {
                msg.innerText = matchData.turn === 1 ? `БЬЕТ ИГРОК 1 (${matchData.t1.name})` : `БЬЕТ ИГРОК 2 (${matchData.t2.name})`;
                msg.style.color = "#00ffcc";
            } else {
                msg.innerText = matchData.turn === 1 ? "ВАШ УДАР!" : "СОПЕРНИК БЬЕТ...";
                msg.style.color = matchData.turn === 1 ? "#00ffcc" : "#da3633";
            }
        }

        // --- ИГРОВОЙ ДВИЖОК CANVAS (ПРО ФИЗИКА) ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let animId;

        let ball = { x: 0, y: 0, z: 2.0, active: false, targetX: 0, targetY: 0, rotation: 0 };
        // Вратарь: targetY добавлен для красивых прыжков в девятку
        let goalie = { x: 0, y: 0, targetX: 0, targetY: 0, diveExtX: 0, diveExtY: 0 };
        let goalArea = { x: 0, y: 0, w: 280, h: 120 }; 
        let fans = [];
        
        let powerState = { active: false, value: 0, x: 0, y: 0 };
        let uiCursor = document.getElementById('target-cursor');
        let uiPowerCont = document.getElementById('power-container');
        let uiPowerFill = document.getElementById('power-fill');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            goalArea.x = canvas.width / 2;
            goalArea.y = canvas.height * 0.35; 
            
            fans = [];
            for (let i = 0; i < 200; i++) {
                fans.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (goalArea.y - 30),
                    color: Math.random() > 0.5 ? "#da3633" : (Math.random() > 0.5 ? "#00ffcc" : "#888"),
                    size: 1 + Math.random() * 2,
                    flashTimer: Math.floor(Math.random() * 200)
                });
            }
            resetPositions();
        }
        window.addEventListener('resize', resizeCanvas);

        function resetPositions() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height * 0.78; 
            ball.z = 2.0; 
            ball.active = false;
            ball.rotation = 0;
            
            goalie.x = goalArea.x;
            goalie.y = goalArea.y; 
            goalie.targetX = goalArea.x;
            goalie.targetY = goalArea.y;
            goalie.diveExtX = 0;
            goalie.diveExtY = 0;
            
            uiCursor.style.display = 'none';
            uiPowerCont.style.display = 'none';
            powerState.active = false;
        }

        function startGame() {
            switchScreen('screen-game');
            resizeCanvas();
            updateUI();
            if (animId) cancelAnimationFrame(animId);
            loop();
        }

        function quitMatchEarly() {
            matchData.isEnded = true;
            switchScreen('screen-modes');
        }

        function handleInputStart(e) {
            if (ball.active || matchData.isEnded) return; 
            if (currentMode !== 'pvp' && matchData.turn === 2) return; 

            let px = e.touches ? e.touches[0].clientX : e.clientX;
            let py = e.touches ? e.touches[0].clientY : e.clientY;

            if (py < goalArea.y + 100 && py > goalArea.y - 120) {
                powerState.active = true;
                powerState.value = 0;
                powerState.x = px;
                powerState.y = py;
                
                uiCursor.style.left = px + 'px';
                uiCursor.style.top = py + 'px';
                uiCursor.style.display = 'block';
                uiPowerCont.style.display = 'block';
            }
        }

        function handleInputEnd() {
            if (powerState.active) {
                powerState.active = false;
                uiCursor.style.display = 'none';
                uiPowerCont.style.display = 'none';
                executeShot(powerState.value, powerState.x, powerState.y);
            }
        }

        canvas.addEventListener('mousedown', handleInputStart);
        window.addEventListener('mouseup', handleInputEnd);
        canvas.addEventListener('touchstart', (e) => { if(e.target === canvas) e.preventDefault(); handleInputStart(e); }, {passive:false});
        window.addEventListener('touchend', handleInputEnd);

        function loop() {
            if (matchData.isEnded) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (powerState.active) {
                powerState.value += 0.08; 
                if (powerState.value > 5) powerState.value = 5;
                let pct = (powerState.value / 5) * 100;
                uiPowerFill.style.width = pct + '%';
                
                if (powerState.value < 4) uiPowerFill.style.background = '#ffeb3b'; 
                else if (powerState.value <= 4.5) uiPowerFill.style.background = '#00ffcc'; 
                else uiPowerFill.style.background = '#da3633'; 
            }

            if (ball.active) {
                ball.x += (ball.targetX - ball.x) * 0.08;
                ball.y += (ball.targetY - ball.y) * 0.08;
                ball.z -= 0.07; 
                ball.rotation += 0.2;
                if (ball.z < 0.6) ball.z = 0.6; 
                
                // Физика прыжка вратаря
                goalie.x += (goalie.targetX - goalie.x) * 0.1;
                goalie.y += (goalie.targetY - goalie.y) * 0.1;
                goalie.diveExtX = (goalie.targetX - goalArea.x);
                goalie.diveExtY = (goalie.targetY - goalArea.y);
            }

            drawStadium();
            drawGoal();
            drawGoalie();
            drawBall();

            animId = requestAnimationFrame(loop);
        }

        function drawStadium() {
            ctx.fillStyle = "#050508";
            ctx.fillRect(0, 0, canvas.width, goalArea.y);
            
            for(let i=0; i<fans.length; i++) {
                let f = fans[i];
                ctx.fillStyle = f.color;
                f.flashTimer--;
                if(f.flashTimer <= 0) {
                    ctx.fillStyle = "#fff";
                    ctx.shadowBlur = 8; ctx.shadowColor = "#fff";
                    f.flashTimer = Math.floor(50 + Math.random() * 150);
                } else {
                    ctx.shadowBlur = 0;
                }
                ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI*2); ctx.fill();
            }
            ctx.shadowBlur = 0;

            let pitchH = canvas.height - goalArea.y;
            ctx.fillStyle = "#1e4a20";
            ctx.fillRect(0, goalArea.y, canvas.width, pitchH);
            
            ctx.fillStyle = "#255a28";
            ctx.beginPath(); ctx.moveTo(0, canvas.height); ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(canvas.width*0.8, goalArea.y); ctx.lineTo(canvas.width*0.2, goalArea.y); ctx.fill();
            
            ctx.strokeStyle = "rgba(255,255,255,0.7)";
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, goalArea.y); ctx.lineTo(canvas.width, goalArea.y); ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(goalArea.x - 220, goalArea.y); ctx.lineTo(goalArea.x - 400, canvas.height); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(goalArea.x + 220, goalArea.y); ctx.lineTo(goalArea.x + 400, canvas.height); ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(goalArea.x - 80, goalArea.y); ctx.lineTo(goalArea.x - 120, goalArea.y + pitchH * 0.25);
            ctx.lineTo(goalArea.x + 120, goalArea.y + pitchH * 0.25); ctx.lineTo(goalArea.x + 80, goalArea.y); ctx.stroke();
            
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.ellipse(goalArea.x, canvas.height * 0.75, 12, 4, 0, 0, Math.PI*2); ctx.fill();
            
            ctx.beginPath(); ctx.ellipse(goalArea.x, canvas.height * 0.95, 120, 30, 0, Math.PI, Math.PI*2); ctx.stroke();
        }

        function drawGoal() {
            let cx = goalArea.x; let cy = goalArea.y; let gw = goalArea.w; let gh = goalArea.h;
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i = -gw/2 + 10; i <= gw/2 - 10; i+=12) {
                ctx.moveTo(cx + i, cy - gh + 15); ctx.lineTo(cx + i + 15, cy - 10);
                ctx.moveTo(cx + i, cy - gh + 15); ctx.lineTo(cx + i - 15, cy - 10);
            }
            ctx.stroke();
            ctx.strokeRect(cx - gw/2 + 20, cy - gh + 20, gw - 40, gh - 20);
            ctx.beginPath();
            ctx.moveTo(cx - gw/2, cy - gh); ctx.lineTo(cx - gw/2 + 20, cy - gh + 20);
            ctx.moveTo(cx + gw/2, cy - gh); ctx.lineTo(cx + gw/2 - 20, cy - gh + 20);
            ctx.moveTo(cx - gw/2, cy); ctx.lineTo(cx - gw/2 + 20, cy - 20);
            ctx.moveTo(cx + gw/2, cy); ctx.lineTo(cx + gw/2 - 20, cy - 20);
            ctx.stroke();

            ctx.fillStyle = "#fff";
            ctx.fillRect(cx - gw/2 - 5, cy - gh, 5, gh); 
            ctx.fillRect(cx + gw/2, cy - gh, 5, gh); 
            ctx.fillRect(cx - gw/2 - 5, cy - gh - 5, gw + 10, 5); 
        }

        function drawGoalie() {
            ctx.save();
            // Переносим центр координат в точку вратаря
            ctx.translate(goalie.x, goalie.y - 25);
            
            // Расчет угла наклона (рыбка). Чем сильнее прыжок вбок (X), тем больше наклон.
            let diveAngle = (goalie.diveExtX / 150) * (Math.PI / 2.2); 
            // Ограничиваем угол, чтобы он не крутился как юла
            diveAngle = Math.max(-Math.PI/2, Math.min(Math.PI/2, diveAngle));
            ctx.rotate(diveAngle);

            // Тело
            ctx.fillStyle = "#ffcc00"; 
            ctx.fillRect(-12, -20, 24, 40);
            
            // Ноги
            ctx.fillStyle = "#111";
            ctx.fillRect(-10, 20, 8, 20); 
            ctx.fillRect(2, 20, 8, 20); 

            // Голова
            ctx.fillStyle = "#ffdbac";
            ctx.beginPath(); ctx.arc(0, -28, 10, 0, Math.PI*2); ctx.fill();

            // Руки (Тянутся ВВЕРХ относительно тела, когда он летит боком)
            ctx.strokeStyle = "#ffcc00";
            ctx.lineWidth = 8;
            ctx.lineCap = "round";
            ctx.beginPath();
            
            if (Math.abs(goalie.diveExtX) > 20) { 
                // В полете - руки вытянуты как у Супермена
                ctx.moveTo(-10, -10); ctx.lineTo(-15, -45); 
                ctx.moveTo(10, -10); ctx.lineTo(15, -45); 
            } else { 
                // Стоит спокойно
                ctx.moveTo(-12, -10); ctx.lineTo(-20, 15);
                ctx.moveTo(12, -10); ctx.lineTo(20, 15);
            }
            ctx.stroke();

            ctx.restore();
        }

        function drawBall() {
            let rad = 15 * ball.z; 
            ctx.save();
            ctx.translate(ball.x, ball.y);
            ctx.rotate(ball.rotation);

            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(0, 0, rad, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = "#222";
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                ctx.lineTo(Math.cos(i * 2 * Math.PI / 5 - Math.PI / 2) * rad * 0.4, 
                           Math.sin(i * 2 * Math.PI / 5 - Math.PI / 2) * rad * 0.4);
            }
            ctx.fill();

            ctx.strokeStyle = "#222"; ctx.lineWidth = Math.max(1, 1.5 * ball.z);
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.cos(i * 2 * Math.PI / 5 - Math.PI / 2) * rad * 0.4, 
                           Math.sin(i * 2 * Math.PI / 5 - Math.PI / 2) * rad * 0.4);
                ctx.lineTo(Math.cos(i * 2 * Math.PI / 5 - Math.PI / 2) * rad, 
                           Math.sin(i * 2 * Math.PI / 5 - Math.PI / 2) * rad);
                ctx.stroke();
            }

            ctx.restore();
        }

        function executeShot(power, tx, ty) {
            ball.active = true;
            
            let gw = goalArea.w;
            let gh = goalArea.h;

            // Проверяем, попал ли вообще в створ
            let inGoalX = tx > goalArea.x - gw/2 && tx < goalArea.x + gw/2;
            let inGoalY = ty > goalArea.y - gh && ty < goalArea.y;

            // Логика "Девяток" и "Шестерок"
            let isCorner = false;
            if (inGoalX && inGoalY) {
                let edgeX = gw * 0.25; // 25% ширины от края
                let edgeY = gh * 0.35; // 35% высоты
                
                let isLeft = tx < (goalArea.x - gw/2 + edgeX);
                let isRight = tx > (goalArea.x + gw/2 - edgeX);
                let isTop = ty < (goalArea.y - gh + edgeY);
                let isBottom = ty > (goalArea.y - edgeY);
                
                if ((isLeft || isRight) && (isTop || isBottom)) {
                    isCorner = true;
                }
            }

            let isGoal = false;
            let isMissOverbar = false;
            
            if (power > 5.0) power = 5.0; // Защита от багов

            // УДАР ПО ВОРОБЬЯМ
            if (power > 4.5) {
                isMissOverbar = true;
            }

            // РАСЧЕТ ШАНСА НА ГОЛ
            let chance = 0;
            if (!isMissOverbar) {
                if (isCorner) {
                    if (power >= 2.0 && power <= 4.0) chance = 0.98; // Идеально в угол
                    else if (power > 4.0 && power <= 4.5) chance = 0.30;
                    else chance = 0.20; 
                } else {
                    if (power >= 3.0 && power <= 4.0) chance = 0.95; // По центру
                    else if (power > 4.0 && power <= 4.5) chance = 0.30;
                    else chance = 0.20; 
                }
            }

            if (isMissOverbar || !inGoalX || !inGoalY) {
                isGoal = false;
            } else {
                isGoal = Math.random() <= chance;
            }

            // НАПРАВЛЕНИЕ МЯЧА И ПРЫЖОК ВРАТАРЯ
            if (isMissOverbar || !inGoalX || !inGoalY) {
                ball.targetX = tx;
                ball.targetY = isMissOverbar ? goalArea.y - 180 : ty; 
                goalie.targetX = goalArea.x + (Math.random() > 0.5 ? 40 : -40); // Немного дёрнулся
                goalie.targetY = goalArea.y;
            } else {
                ball.targetX = tx;
                ball.targetY = ty;
                
                if (isGoal) {
                    // Вратарь не угадал или не дотянулся
                    if (Math.random() > 0.5) {
                        goalie.targetX = tx > goalArea.x ? goalArea.x - 120 : goalArea.x + 120; // Упал в другой угол
                        goalie.targetY = goalArea.y;
                    } else {
                        goalie.targetX = tx > goalArea.x ? tx - 50 : tx + 50; // Не долетел
                        goalie.targetY = ty + 20;
                    }
                } else {
                    // СЕЙВ! Вратарь летит прямо в мяч
                    goalie.targetX = tx;
                    goalie.targetY = ty;
                }
            }

            setTimeout(() => {
                registerResult(isGoal);
            }, 1000);
        }

        function registerResult(scored) {
            if (matchData.isEnded) return;

            let hist = matchData.turn === 1 ? matchData.t1History : matchData.t2History;
            
            if (scored) {
                if (matchData.turn === 1) matchData.t1Score++; else matchData.t2Score++;
                hist[matchData.currentRound] = 'hit';
            } else {
                hist[matchData.currentRound] = 'miss';
            }

            updateUI();

            if (matchData.turn === 1) {
                matchData.turn = 2;
                resetPositions();
                updateUI();
                
                if (currentMode !== 'pvp') {
                    setTimeout(executeAITurn, 1500);
                }
            } else {
                matchData.turn = 1;
                matchData.currentRound++;
                resetPositions();
                
                if (matchData.currentRound >= matchData.kicks) {
                    checkMatchEnd(); 
                } else {
                    updateUI();
                }
            }
        }

        function executeAITurn() {
            if (matchData.isEnded) return;
            let isGoal = Math.random() > 0.5;
            registerResult(isGoal);
        }

        function checkMatchEnd() {
            if (matchData.t1Score !== matchData.t2Score) {
                finishMatch();
            } else {
                matchData.kicks++;
                matchData.t1History.push('empty');
                matchData.t2History.push('empty');
                updateUI();
            }
        }

        function finishMatch() {
            matchData.isEnded = true;
            
            switchScreen('screen-result');

            let p1Won = matchData.t1Score > matchData.t2Score;
            let title = document.getElementById('res-title');
            let reward = document.getElementById('res-reward');
            
            document.getElementById('res-score').innerText = `${matchData.t1Score} : ${matchData.t2Score}`;

            if (currentMode === 'pvp') {
                title.innerText = p1Won ? "ПОБЕДА ИГРОКА 1" : "ПОБЕДА ИГРОКА 2";
                title.style.color = "#00ffcc";
                reward.innerText = "ДРУЖЕСКИЙ МАТЧ ЗАВЕРШЕН";
            } else {
                if (p1Won) {
                    title.innerText = "ПОБЕДА!";
                    title.style.color = "#00ffcc";
                    let coins = currentMode === 'quick' ? matchData.kicks * 10 : 0; 
                    if(coins > 0) addCoins(coins);
                    reward.innerText = coins > 0 ? `НАГРАДА: +${coins} SC 💎` : '';
                } else {
                    title.innerText = "ПОРАЖЕНИЕ";
                    title.style.color = "#da3633";
                    reward.innerText = "";
                }
            }
        }

        function handleResultNext() {
            if (currentMode === 'tournament') {
                if (matchData.t1Score > matchData.t2Score) {
                    tourneyData.round++;
                    if (tourneyData.round > 2) {
                        document.getElementById('res-title').innerText = "ЧЕМПИОН МУНДИАЛЯ!";
                        document.getElementById('res-score').innerText = "🏆";
                        addCoins(500);
                        document.getElementById('res-reward').innerText = "ГЛАВНЫЙ ПРИЗ: +500 SC 💎";
                        document.getElementById('btn-next-action').innerText = "ЗАВЕРШИТЬ ТУРНИР";
                        currentMode = 'finished'; 
                    } else {
                        let newTeams = [];
                        for(let i=0; i < tourneyData.teamsLeft.length; i+=2) {
                            let tA = tourneyData.teamsLeft[i];
                            let tB = tourneyData.teamsLeft[i+1];
                            if (tA.id === tourneyData.playerTeam.id || tB.id === tourneyData.playerTeam.id) {
                                newTeams.push(tourneyData.playerTeam); 
                            } else {
                                newTeams.push(Math.random() > 0.5 ? tA : tB); 
                            }
                        }
                        tourneyData.teamsLeft = newTeams;
                        buildBracket();
                        switchScreen('screen-bracket');
                    }
                } else {
                    alert("Вы вылетаете из турнира!");
                    switchScreen('screen-modes');
                }
            } else if (currentMode === 'finished') {
                switchScreen('screen-modes');
            } else {
                switchScreen('screen-modes');
            }
        }

        function addCoins(amount) {
            let currentBalance = parseInt(localStorage.getItem('syndicate_coins')) || 0;
            localStorage.setItem('syndicate_coins', currentBalance + amount);
        }
    </script>
